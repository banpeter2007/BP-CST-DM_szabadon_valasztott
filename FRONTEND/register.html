<!DOCTYPE html>

<head>

<link rel="icon" type="image/png" href="../kepek/title_icon2.png">

<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@300..800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
height:100vh;
background:linear-gradient(135deg,rgba(255,255,255,1) 0%, rgba(115,165,189,0.64) 100%);
font-family:"Google Sans Code",serif;

#baseBox{

}

#logoImage{

#RegisterBox{

}

.inputs{

}

.inputs:hover{

}

#RegisterButton{

}

#RegisterButton:hover{

}

#place_for_error_message{
opacity:0;

}

#createOneAccountParagraph{

}

#createOneAccountLink{

<body>

<div id="baseBox">

<div id="RegisterBox">

<p style="text-align:center;">Regisztr찼ci처</p>

<input type="text" placeholder="Vezet챕kn챕v" class="inputs" id="lastName_input">
<input type="text" placeholder="Keresztn챕v" class="inputs" id="firstName_input">
<input type="text" placeholder="E-mail" class="inputs" id="email_input">
<input type="password" placeholder="Jelsz처" class="inputs" id="password_input">

<p id="place_for_error_message"></p>

<button id="RegisterButton">Regisztr찼lok!</button>

<p id="createOneAccountParagraph">
Van m찼r fi처kod?
<a href="register_signIn.html" id="createOneAccountLink">Jelentkezz be!</a>
</p>

</div>
</div>

<script>

// SUPABASE
const supabaseUrl = "https://mwtkgtkkzlemolumlxab.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13dGtndGtremxlbW9sdW1seGFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMTc5MDksImV4cCI6MjA4Njc5MzkwOX0.wjd8cnOYRD1Kgb1pRyfCDmpiOgq4LV15LXRn5YT7mWs";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// ERROR MESSAGE BOX
const errorBox = document.getElementById("place_for_error_message");

function showMessage(text,color){

errorBox.textContent=text;
errorBox.style.color=color;
errorBox.style.opacity="1";

setTimeout(()=>{
errorBox.style.opacity="0";

setTimeout(()=>{
errorBox.textContent="";
},500);

},2000);

}

// INPUT CLEAR ERROR
document.querySelectorAll(".inputs").forEach(input=>{
input.addEventListener("input",()=>{
errorBox.style.opacity="0";
});
});

// REGISTER
document.getElementById("RegisterButton").addEventListener("click", async function(){

const lastName=document.getElementById("lastName_input").value.trim();
const firstName=document.getElementById("firstName_input").value.trim();
const email=document.getElementById("email_input").value.trim();
const password=document.getElementById("password_input").value;

const fullName=lastName+" "+firstName;

// REGEX
const nameRegex=/^[A-Z횁횋횒횙횜흶횣횥키][a-z찼챕챠처철흷첬체킥]+$/;
const emailRegex=/^[^\s@]+@[^\s@]+\.[a-z]{2,}$/i;
const passwordRegex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;

// VALIDATION
if(!nameRegex.test(lastName) ||
   !nameRegex.test(firstName) ||
   !emailRegex.test(email) ||
   !passwordRegex.test(password)){

showMessage("K챕rem 챕rv챕nyes adatokat adjon meg!","red");
return;

}

// SUPABASE REGISTER
const {data,error}=await supabaseClient.auth.signUp({
email:email,
password:password
});

if(error){
showMessage("Hiba a regisztr찼ci처 sor찼n!","red");
console.error(error.message);
return;
}

// PROFILE INSERT
await supabaseClient.from("profiles").insert({
id:data.user.id,
full_name:fullName,
role:"student"
});

// CLEAR INPUTS
document.querySelectorAll(".inputs").forEach(input=>{
input.value="";
});

showMessage("Sikeres regisztr찼ci처!","green");

// REDIRECT
setTimeout(()=>{
window.location.href="register_signIn.html";
},2000);

});

</script>

</html>
