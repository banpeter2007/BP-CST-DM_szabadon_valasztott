<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduShare | Register</title>

<link rel="icon" type="image/png" href="kepek/title_icon2.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@300..800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
height:100vh;
background:linear-gradient(135deg,rgba(255,255,255,1) 0%, rgba(115,165,189,0.64) 100%);
font-family:"Google Sans Code",serif;
margin:0;
}

#baseBox{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
}

#logoImage{
position:absolute;
top:10px;
left:0px;
}

#RegisterBox{
display:flex;
justify-content:center;
width:30%;
background:white;
flex-direction:column;
gap:20px;
padding:3%;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border-top:3px solid rgba(115,165,189,0.64);
}

@media screen and (max-width: 768px){
        #RegisterBox{
            width: 80%;
        }
    }

.inputs{
padding:12px;
width:100%;
margin:auto;
border-radius:10px;
border:1px solid #ccc;
transition: all 0.3s ease;
box-sizing: border-box;
font-family: inherit;
}

.inputs:focus {
    outline: none;
    border-color: #536c80;
    box-shadow: 0 0 5px rgba(83, 108, 128, 0.3);
}

.inputs:hover{
background-color:rgb(240,238,238);
}

textarea.inputs {
    resize: vertical;
    min-height: 80px;
}

#RegisterButton{
padding:12px;
width:60%;
margin:auto;
border-radius:10px;
background:#536c80;
color:white;
cursor:pointer;
transition:0.2s;
border:none;
font-weight: bold;
font-size: 16px;
}

#RegisterButton:hover:not(:disabled){
transform:scale(1.05);
background:#405464;
}

#RegisterButton:disabled {
    background:#a0a0a0;
    cursor: not-allowed;
    transform: none;
}

#place_for_error_message{
opacity:0;
transition:opacity 0.5s ease;
text-align:center;
margin-top:-10px;
font-weight:bold;
font-size: 14px;
}

#createOneAccountParagraph{
text-align:center;
}

#createOneAccountLink{
text-decoration:none;
color: #536c80;
font-weight: bold;
}

#createOneAccountLink:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div id="baseBox">

<div id="logoImage">
<img src="kepek/main_logo.png" height="70">
</div>

<div id="RegisterBox">

<p style="text-align:center; font-size: 22px; font-weight: bold; color: #536c80;">Regisztráció</p>

<input type="text" placeholder="Vezetéknév *" class="inputs" id="lastName_input">
<input type="text" placeholder="Keresztnév *" class="inputs" id="firstName_input">
<input type="email" placeholder="E-mail cím *" class="inputs" id="email_input">
<input type="password" placeholder="Jelszó * (min. 6 karakter, kis- és nagybetű, szám)" class="inputs" id="password_input">
<input type="text" placeholder="Osztály (pl.: 11, 12, Érettségiző)" class="inputs" id="grade_input">
<textarea placeholder="Bemutatkozás (pl.: Milyen tantárgyakban vagy erős? Mit szeretnél tanulni?)" class="inputs" id="bio_input" rows="3"></textarea>

<p id="place_for_error_message"></p>

<button id="RegisterButton">Regisztrálok!</button>

<p id="createOneAccountParagraph">
Van már fiókod?
<a href="register_signIn.html" id="createOneAccountLink">Jelentkezz be!</a>
</p>

</div>
</div>

<script>

// SUPABASE KONFIGURÁCIÓ
const supabaseUrl = "https://mwtkgtkkzlemolumlxab.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13dGtndGtremxlbW9sdW1seGFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMTc5MDksImV4cCI6MjA4Njc5MzkwOX0.wjd8cnOYRD1Kgb1pRyfCDmpiOgq4LV15LXRn5YT7mWs";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// ELEMEK LEKÉRÉSE
const errorBox = document.getElementById("place_for_error_message");
const registerBtn = document.getElementById("RegisterButton");

// HIBAÜZENET MEGJELENÍTÉSE
function showMessage(text, color, duration = 3000) {
    errorBox.textContent = text;
    errorBox.style.color = color;
    errorBox.style.opacity = "1";

    setTimeout(() => {
        errorBox.style.opacity = "0";
        setTimeout(() => {
            if (errorBox.textContent === text) {
                errorBox.textContent = "";
            }
        }, 500);
    }, duration);
}

// INPUT MEZŐK TISZTÍTÁSA
document.querySelectorAll(".inputs").forEach(input => {
    input.addEventListener("input", () => {
        errorBox.style.opacity = "0";
    });
});

// REGISZTRÁCIÓS FÜGGVÉNY
document.getElementById("RegisterButton").addEventListener("click", async function() {
    
    // ADATOK BEOLVASÁSA
    const lastName = document.getElementById("lastName_input").value.trim();
    const firstName = document.getElementById("firstName_input").value.trim();
    const email = document.getElementById("email_input").value.trim();
    const password = document.getElementById("password_input").value;
    const grade = document.getElementById("grade_input").value.trim();
    const bio = document.getElementById("bio_input").value.trim();
    
    const fullName = lastName + " " + firstName;
    
    // VALIDÁCIÓ
    const nameRegex = /^[A-ZÁÉÍÓÖŐÚÜŰ][a-záéíóöőúüű]+$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[a-z]{2,}$/i;
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;
    
    if (!lastName || !firstName || !email || !password) {
        showMessage("Kérlek töltsd ki a kötelező mezőket!", "red");
        return;
    }
    
    if (!nameRegex.test(lastName)) {
        showMessage("A vezetéknév nagybetűvel kezdődjön!", "red");
        return;
    }
    
    if (!nameRegex.test(firstName)) {
        showMessage("A keresztnév nagybetűvel kezdődjön!", "red");
        return;
    }
    
    if (!emailRegex.test(email)) {
        showMessage("Kérlek érvényes email címet adj meg!", "red");
        return;
    }
    
    if (!passwordRegex.test(password)) {
        showMessage("A jelszó nem felel meg a követelményeknek!", "red");
        return;
    }
    
    registerBtn.disabled = true;
    registerBtn.textContent = "⏳ Regisztráció folyamatban...";
    
    try {
        // 1. REGISZTRÁCIÓ (email megerősítés nélkül)
        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    full_name: fullName
                }
            }
        });
        
        if (error) {
            console.error("Auth hiba:", error);
            if (error.message.includes("User already registered")) {
                showMessage("❌ Ez az email cím már regisztrálva van!", "red", 4000);
            } else {
                showMessage("❌ Hiba: " + error.message, "red", 4000);
            }
            registerBtn.disabled = false;
            registerBtn.textContent = "Regisztrálok!";
            return;
        }
        
        if (!data || !data.user) {
            showMessage("❌ Hiba történt a regisztráció során!", "red");
            registerBtn.disabled = false;
            registerBtn.textContent = "Regisztrálok!";
            return;
        }
        
        console.log("✅ Regisztráció sikeres, ID:", data.user.id);
        
        // 2. AUTOMATIKUS BEJELENTKEZÉS
        const { error: signInError } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });
        
        if (signInError) {
            console.error("Bejelentkezési hiba:", signInError);
            showMessage("⚠️ Regisztráció ok, de bejelentkezés nem sikerült!", "orange", 3000);
            setTimeout(() => window.location.href = "register_signIn.html", 3000);
            return;
        }
        
        console.log("✅ Bejelentkezve");
        
        // 3. PROFIL BESZÚRÁSA
        const { error: profileError } = await supabaseClient
            .from("profiles")
            .insert({
                id: data.user.id,
                full_name: fullName,
                grade: grade || null,
                bio: bio || null
            });
        
        if (profileError) {
            console.error("❌ Profil beszúrás hiba:", profileError);
            showMessage("❌ Profil mentés sikertelen: " + profileError.message, "red", 5000);
            setTimeout(() => window.location.href = "main.html", 3000);
            return;
        }
        
        console.log("✅ Profil mentve!");
        
        // MEZŐK ÜRÍTÉSE
        document.getElementById("lastName_input").value = "";
        document.getElementById("firstName_input").value = "";
        document.getElementById("email_input").value = "";
        document.getElementById("password_input").value = "";
        document.getElementById("grade_input").value = "";
        document.getElementById("bio_input").value = "";
        
        showMessage("✅ Regisztráció sikeres! Átirányítás...", "green", 2000);
        
        setTimeout(() => {
            window.location.href = "main.html";
        }, 2000);
        
    } catch (err) {
        console.error("❌ Váratlan hiba:", err);
        showMessage("❌ Váratlan hiba: " + err.message, "red", 4000);
        registerBtn.disabled = false;
        registerBtn.textContent = "Regisztrálok!";
    }
});

// ENTER BILLENTYŰ
document.querySelectorAll(".inputs").forEach(input => {
    input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            document.getElementById("RegisterButton").click();
        }
    });
});

</script>

</body>
</html>
